<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART LENDER - Loan Eligibility Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>SMART LENDER</h1>
    <p class="subtitle">Loan Eligibility Prediction System</p>

    <form action="/submit" method="POST">

        <div class="form-group">
            <label>Gender</label>
            <select name="Gender" required>
                <option value="">Select Gender</option>
                <option value="1">Male</option>
                <option value="0">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Marital Status</label>
            <select name="Married" required>
                <option value="">Select Status</option>
                <option value="1">Married</option>
                <option value="0">Unmarried</option>
            </select>
        </div>

        <div class="form-group">
            <label>Dependents</label>
            <select name="Dependents" required>
                <option value="">Select</option>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3+</option>
            </select>
        </div>

        <div class="form-group">
            <label>Education</label>
            <select name="Education" required>
                <option value="">Select Education</option>
                <option value="0">Graduate</option>
                <option value="1">Not Graduate</option>
            </select>
        </div>

        <div class="form-group">
            <label>Self Employed</label>
            <select name="Self_Employed" required>
                <option value="">Select</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Applicant Income</label>
            <input type="number" name="ApplicantIncome" placeholder="Enter Applicant Income" required>
        </div>

        <div class="form-group">
            <label>Co-applicant Income</label>
            <input type="number" name="CoapplicantIncome" placeholder="Enter Co-applicant Income" required>
        </div>

        <div class="form-group">
            <label>Loan Amount</label>
            <input type="number" name="LoanAmount" placeholder="Enter Loan Amount" required>
        </div>

        <div class="form-group">
            <label>Loan Amount Term</label>
            <input type="number" name="Loan_Amount_Term" placeholder="Example: 360" required>
        </div>

        <div class="form-group">
            <label>Credit History</label>
            <select name="Credit_History" required>
                <option value="">Select</option>
                <option value="1">Good</option>
                <option value="0">Bad</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label>Property Area</label>
            <select name="Property_Area" required>
                <option value="">Select Property Area</option>
                <option value="2">Urban</option>
                <option value="1">Semiurban</option>
                <option value="0">Rural</option>
            </select>
        </div>

        <div class="full-width">
            <button type="submit">Predict Loan Eligibility</button>
        </div>

    </form>

</div>

</body>
</html>
